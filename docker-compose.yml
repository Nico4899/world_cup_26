services:
  postgres:
    image: postgres:16-alpine
    container_name: wc2026-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wc2026
      POSTGRES_USER: wc2026
      POSTGRES_PASSWORD: wc2026_local
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wc2026 -d wc2026"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local LLM sidecar for SHAP-to-prose match previews. Mistral 7B
  # Instruct (q4_K_M) ~ 4 GB; CPU inference ~ 5 s per 150-token preview.
  # The API + scheduler degrade gracefully when this container is down:
  # `OLLAMA_BASE_URL` unset (or the container unreachable) => LLM
  # endpoints return 503 and the dashboard hides the LLM section.
  ollama:
    image: ollama/ollama:latest
    container_name: wc2026-ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
    volumes:
      - ollama_models:/root/.ollama
    # Internal-only by default — the api service reaches Ollama via the
    # compose network. To expose for interactive testing, uncomment:
    #   ports:
    #     - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: wc2026-scheduler
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://wc2026:wc2026_local@postgres:5432/wc2026
      LOG_LEVEL: INFO
      # Optional — leave unset to skip the football-data.org daily refresh.
      FOOTBALL_DATA_ORG_KEY: ${FOOTBALL_DATA_ORG_KEY:-}
    volumes:
      # Share `data/` with the host so ingest writes (Jürisoo CSV, eloratings
      # Parquet) and model artefacts persist across container restarts.
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "wc2026.scheduler.jobs"]

  api:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: wc2026-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://wc2026:wc2026_local@postgres:5432/wc2026
      LOG_LEVEL: INFO
      # When set, the LLM preview endpoint dials this host. Leave unset
      # to run the API with no LLM features (everything else works).
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: mistral:7b-instruct-q4_K_M
    ports:
      - "8000:8000"
    volumes:
      # Read-only mount: the API consumes Jürisoo CSV, Elo Parquet, and the
      # latest model artefact written by the scheduler.
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      # NB: `depends_on: condition: service_healthy` would block API
      # startup until Ollama is healthy. We intentionally use plain
      # `service_started` so the API comes up even when Ollama is still
      # pulling its 4 GB model — LLM endpoints will 503 until ready.
      ollama:
        condition: service_started
    command:
      [
        "python", "-m", "uvicorn",
        "wc2026.api.main:app",
        "--host", "0.0.0.0",
        "--port", "8000",
      ]

volumes:
  postgres_data:
  ollama_models:
